{% raw %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculus Suite</title>

  <link rel="stylesheet" href="https://home.akhilbee.dev/theme.css">
  <script src="https://home.akhilbee.dev/footer.js" defer></script>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      startup: {
        pageReady: () => {
          return MathJax.startup.defaultPageReady();
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script defer src="https://unpkg.com/mathlive"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
      margin: 40px auto;
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-weight: 700;
      color: var(--heading-color);
      font-size: 1.8rem;
    }

    /* Circular Theme Toggle Button */
    .theme-toggle-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      transition: all 0.2s ease;
      padding: 0;
    }

    .theme-toggle-btn:hover {
      transform: scale(1.08);
    }

    .theme-svg path {
      fill: var(--text-color);
      transition: fill 0.3s ease;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 5px;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .tab-btn:hover {
      opacity: 1;
    }

    .tab-btn.active {
      background: var(--tag-bg);
      color: var(--tag-text);
      border-color: var(--tag-bg);
      opacity: 1;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--text-color);
      opacity: 0.85;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: var(--bg-color);
      color: var(--text-color);
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.2s, background-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--heading-color);
    }

    /* MathLive Custom Field Styling */
    math-field {
      width: 100%;
      font-size: 1.25rem;
      background: var(--bg-color);
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      box-sizing: border-box;
      outline: none;
      --hue: 199;
      --template-background: var(--bg-color);
      --text-color: var(--text-color);
      --caret-color: var(--heading-color);
      --selection-background-color: var(--border-color);
      transition: border-color 0.2s, background-color 0.3s;
    }

    math-field:focus-within {
      border-color: var(--heading-color);
    }

    math-field::part(virtual-keyboard-toggle),
    math-field::part(menu-toggle) {
      display: none;
    }

    button.submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--heading-color);
      color: #ffffff;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }

    button.submit-btn:hover {
      opacity: 0.9;
    }

    button.submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Result Box */
    .result-box {
      margin-top: 24px;
      padding: 20px;
      background: var(--bg-color);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      text-align: center;
      overflow-x: auto;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .error {
      color: #ef5350;
      font-size: 0.95rem;
    }

    akhilbee-footer {
      margin-top: auto;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-container">
      <h1>Calculus Solver</h1>
      <button id="theme-toggle" class="theme-toggle-btn" type="button" aria-label="Toggle dark/light mode">
        <svg class="theme-svg" viewBox="0 0 24 24" width="22" height="22">
          <path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.82.89-3.42 2.26-4.4C12.92 3.04 12.46 3 12 3z"/>
        </svg>
      </button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('derivatives', event)">Derivatives</button>
      <button class="tab-btn" onclick="switchTab('implicit', event)">Implicit Diff</button>
      <button class="tab-btn" onclick="switchTab('integrals', event)">Integrals</button>
      <button class="tab-btn" onclick="switchTab('taylor', event)">Taylor Expansion</button>
    </div>

    <form id="solver-form" onsubmit="handleSolve(event)">
      <div class="form-group">
        <label for="latex_input">Math Expression:</label>
        <math-field id="latex_input">x^2 \sin(x)</math-field>
      </div>

      <div id="derivative-options">
        <div class="grid-2">
          <div class="form-group">
            <label for="deriv-var">Variable:</label>
            <input type="text" id="deriv-var" value="x" />
          </div>
          <div class="form-group">
            <label for="deriv-order">Derivative Order:</label>
            <input type="number" id="deriv-order" value="1" min="1" max="10" />
          </div>
        </div>
      </div>

      <div id="implicit-options" style="display: none;">
        <div class="grid-2">
          <div class="form-group">
            <label for="imp-xvar">Independent Var (x):</label>
            <input type="text" id="imp-xvar" value="x" />
          </div>
          <div class="form-group">
            <label for="imp-yvar">Dependent Var (y):</label>
            <input type="text" id="imp-yvar" value="y" />
          </div>
        </div>
      </div>

      <div id="integral-options" style="display: none;">
        <div class="grid-2">
          <div class="form-group">
            <label for="int-var">Variable:</label>
            <input type="text" id="int-var" value="x" />
          </div>
          <div></div>
          <div class="form-group">
            <label for="int-lower">Lower Limit (Optional):</label>
            <input type="text" id="int-lower" placeholder="e.g. 0" />
          </div>
          <div class="form-group">
            <label for="int-upper">Upper Limit (Optional):</label>
            <input type="text" id="int-upper" placeholder="e.g. \pi" />
          </div>
        </div>
      </div>

      <div id="taylor-options" style="display: none;">
        <div class="grid-2">
          <div class="form-group">
            <label for="taylor-var">Variable:</label>
            <input type="text" id="taylor-var" value="x" />
          </div>
          <div class="form-group">
            <label for="taylor-center">Expansion Center (a):</label>
            <input type="text" id="taylor-center" value="0" />
          </div>
        </div>
        <div class="form-group">
          <label for="taylor-terms">Number of Terms (Order):</label>
          <input type="number" id="taylor-terms" value="5" min="1" max="20" />
        </div>
      </div>

      <button type="submit" class="submit-btn">Solve</button>
    </form>

    <div class="result-box" id="result-container">
      <span style="opacity: 0.7;">Output equation will render here</span>
    </div>
  </div>

  <akhilbee-footer></akhilbee-footer>

  <script>
    // --- Theme Toggle Logic ---
    const themeToggleBtn = document.getElementById('theme-toggle');

    function applyTheme(theme) {
      if (theme === 'dark') {
        document.body.classList.add('dark-mode');
      } else {
        document.body.classList.remove('dark-mode');
      }
    }

    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
      applyTheme('dark');
    } else {
      applyTheme('light');
    }

    themeToggleBtn?.addEventListener('click', () => {
      const isDarkMode = document.body.classList.contains('dark-mode');
      const newTheme = isDarkMode ? 'light' : 'dark';
      applyTheme(newTheme);
      localStorage.setItem('theme', newTheme);
    });

    // --- Application Logic ---
    const API_BASE_URL = "/api";
    let currentTab = "derivatives";

    document.addEventListener('DOMContentLoaded', () => {
      const mf = document.getElementById('latex_input');
      if (mf) {
        mf.menuItems = [];
        mf.inlineShortcuts = {
          'pi': '\\pi',
          'theta': '\\theta',
          'sqrt': '\\sqrt{#?}'
        };
      }
      if (window.mathVirtualKeyboard) {
        window.mathVirtualKeyboard.layouts = ['numeric', 'symbols'];
      }
    });

    function switchTab(tabName, event) {
      currentTab = tabName;
      
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      if (event && event.target) {
        event.target.classList.add('active');
      }

      document.getElementById('derivative-options').style.display = tabName === 'derivatives' ? 'block' : 'none';
      document.getElementById('implicit-options').style.display = tabName === 'implicit' ? 'block' : 'none';
      document.getElementById('integral-options').style.display = tabName === 'integrals' ? 'block' : 'none';
      document.getElementById('taylor-options').style.display = tabName === 'taylor' ? 'block' : 'none';

      const mathField = document.getElementById('latex_input');
      if (tabName === 'derivatives') mathField.value = "x^2 \\sin(x)";
      if (tabName === 'implicit') mathField.value = "x^2 + y^2 = 25";
      if (tabName === 'integrals') mathField.value = "x^2 \\cos(x)";
      if (tabName === 'taylor') mathField.value = "\\sin(x)";
    }

    async function handleSolve(e) {
      e.preventDefault();

      const submitBtn = document.querySelector('.submit-btn');
      const resultDiv = document.getElementById('result-container');
      const mathField = document.getElementById('latex_input');
      const inputLatex = mathField.value.trim();

      submitBtn.disabled = true;
      submitBtn.innerText = "Calculating...";
      resultDiv.innerHTML = `<span style="opacity: 0.7;">Calculating...</span>`;

      let endpoint = "";
      let payload = { latex_input: inputLatex };

      if (currentTab === 'derivatives') {
        endpoint = `${API_BASE_URL}/derivative`;
        payload.variable = document.getElementById('deriv-var').value || 'x';
        payload.order = parseInt(document.getElementById('deriv-order').value) || 1;
      }
      else if (currentTab === 'implicit') {
        endpoint = `${API_BASE_URL}/implicit`;
        payload.x_var = document.getElementById('imp-xvar').value || 'x';
        payload.y_var = document.getElementById('imp-yvar').value || 'y';
      }
      else if (currentTab === 'integrals') {
        endpoint = `${API_BASE_URL}/integral`;
        payload.variable = document.getElementById('int-var').value || 'x';
        payload.lower_bound = document.getElementById('int-lower').value.trim() || null;
        payload.upper_bound = document.getElementById('int-upper').value.trim() || null;
      } 
      else if (currentTab === 'taylor') {
        endpoint = `${API_BASE_URL}/taylor`;
        payload.variable = document.getElementById('taylor-var').value || 'x';
        payload.center = document.getElementById('taylor-center').value || '0';
        payload.num_terms = parseInt(document.getElementById('taylor-terms').value) || 5;
      }

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.success) {
          resultDiv.innerHTML = `$$${data.result_latex}$$`;
        } else {
          resultDiv.innerHTML = `<span class="error">Error: ${data.error}</span>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<span class="error">Failed to connect to backend server.</span>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Solve";
        
        if (window.MathJax && window.MathJax.typesetPromise) {
          MathJax.typesetPromise([resultDiv]);
        }
      }
    }
  </script>
</body>
</html>
{% endraw %}
