<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculus Suite</title>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      startup: {
        pageReady: () => {
          return MathJax.startup.defaultPageReady();
        }
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <script defer src="https://unpkg.com/mathlive"></script>

  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --accent-hover: #0284c7;
      --text-color: #f8fafc;
      --subtext: #94a3b8;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-weight: 700;
      color: var(--accent);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 5px;
      background: #334155;
      border: none;
      color: var(--subtext);
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #0f172a;
    }

    /* Form Fields */
    .form-group {
      margin-bottom: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--subtext);
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #fff;
      font-size: 1rem;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* MathLive Field Custom Styling */
    math-field {
      width: 100%;
      font-size: 1.25rem;
      background: #0f172a;
      border-radius: 8px;
      padding: 8px 12px;
      border: 1px solid #475569;
      color: #fff;
      box-sizing: border-box;
      outline: none;
      --hue: 199;
      --template-background: #0f172a;
      --text-color: #f8fafc;
      --caret-color: #38bdf8;
      --selection-background-color: #0284c7;
    }

    math-field:focus-within {
      border-color: var(--accent);
    }

    /* Hide virtual keyboard and context menu toggles */
    math-field::part(virtual-keyboard-toggle),
    math-field::part(menu-toggle) {
      display: none;
    }

    button.submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: #0f172a;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }

    button.submit-btn:hover {
      background: var(--accent-hover);
      color: #fff;
    }

    button.submit-btn:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    /* Result Box */
    .result-box {
      margin-top: 24px;
      padding: 20px;
      background: #0f172a;
      border-radius: 8px;
      border: 1px solid #334155;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      text-align: center;
      overflow-x: auto;
    }

    .error {
      color: #f87171;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Calculus Solver</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('derivatives', event)">Derivatives</button>
      <button class="tab-btn" onclick="switchTab('implicit', event)">Implicit Diff</button>
      <button class="tab-btn" onclick="switchTab('integrals', event)">Integrals</button>
      <button class="tab-btn" onclick="switchTab('taylor', event)">Taylor Expansion</button>
    </div>

    <form id="solver-form" onsubmit="handleSolve(event)">
      <div class="form-group">
        <label for="latex_input">Math Expression:</label>
        <math-field id="latex_input">x^2 \sin(x)</math-field>
      </div>

      <div id="derivative-options">
        <div class="grid-2">
          <div class="form-group">
            <label for="deriv-var">Variable:</label>
            <input type="text" id="deriv-var" value="x" />
          </div>
          <div class="form-group">
            <label for="deriv-order">Derivative Order:</label>
            <input type="number" id="deriv-order" value="1" min="1" max="10" />
          </div>
        </div>
      </div>

      <div id="implicit-options" style="display: none;">
        <div class="grid-2">
          <div class="form-group">
            <label for="imp-xvar">Independent Var (x):</label>
            <input type="text" id="imp-xvar" value="x" />
          </div>
          <div class="form-group">
            <label for="imp-yvar">Dependent Var (y):</label>
            <input type="text" id="imp-yvar" value="y" />
          </div>
        </div>
      </div>

      <div id="integral-options" style="display: none;">
        <div class="grid-2">
          <div class="form-group">
            <label for="int-var">Variable:</label>
            <input type="text" id="int-var" value="x" />
          </div>
          <div></div>
          <div class="form-group">
            <label for="int-lower">Lower Limit (Optional):</label>
            <input type="text" id="int-lower" placeholder="e.g. 0" />
          </div>
          <div class="form-group">
            <label for="int-upper">Upper Limit (Optional):</label>
            <input type="text" id="int-upper" placeholder="e.g. \pi" />
          </div>
        </div>
      </div>

      <div id="taylor-options" style="display: none;">
        <div class="grid-2">
          <div class="form-group">
            <label for="taylor-var">Variable:</label>
            <input type="text" id="taylor-var" value="x" />
          </div>
          <div class="form-group">
            <label for="taylor-center">Expansion Center (a):</label>
            <input type="text" id="taylor-center" value="0" />
          </div>
        </div>
        <div class="form-group">
          <label for="taylor-terms">Number of Terms (Order):</label>
          <input type="number" id="taylor-terms" value="5" min="1" max="20" />
        </div>
      </div>

      <button type="submit" class="submit-btn">Solve</button>
    </form>

    <div class="result-box" id="result-container">
      <span style="color: var(--subtext);">Output equation will render here</span>
    </div>
  </div>

  <script>
    const API_BASE_URL = "/api";
    let currentTab = "derivatives";

    document.addEventListener('DOMContentLoaded', () => {
      const mf = document.getElementById('latex_input');

      // Disable context menu options (fonts, colors, background options)
      mf.menuItems = [];

      // Limit shortcuts so text like 'int' doesn't auto-convert to \int
      mf.inlineShortcuts = {
        'pi': '\\pi',
        'theta': '\\theta',
        'sqrt': '\\sqrt{#?}'
      };

      if (window.mathVirtualKeyboard) {
        window.mathVirtualKeyboard.layouts = ['numeric', 'symbols'];
      }
    });

    function switchTab(tabName, event) {
      currentTab = tabName;
      
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      if (event && event.target) {
        event.target.classList.add('active');
      }

      document.getElementById('derivative-options').style.display = tabName === 'derivatives' ? 'block' : 'none';
      document.getElementById('implicit-options').style.display = tabName === 'implicit' ? 'block' : 'none';
      document.getElementById('integral-options').style.display = tabName === 'integrals' ? 'block' : 'none';
      document.getElementById('taylor-options').style.display = tabName === 'taylor' ? 'block' : 'none';

      const mathField = document.getElementById('latex_input');
      if (tabName === 'derivatives') mathField.value = "f(x) = x^2 \\sin(x)";
      if (tabName === 'implicit') mathField.value = "x^2 + y^2 = 25";
      if (tabName === 'integrals') mathField.value = "x^2 \\cos(x)";
      if (tabName === 'taylor') mathField.value = "\\sin(x)";
    }

    async function handleSolve(e) {
      e.preventDefault();

      const submitBtn = document.querySelector('.submit-btn');
      const resultDiv = document.getElementById('result-container');

      const mathField = document.getElementById('latex_input');
      const inputLatex = mathField.value.trim();

      // Check for forbidden structures like matrices or integrals in derivative field
      const forbiddenPatterns = [/\\begin\{matrix\}/, /\\begin\{bmatrix\}/];
      if (currentTab !== 'integrals') forbiddenPatterns.push(/\\int/);

      for (const pattern of forbiddenPatterns) {
        if (pattern.test(inputLatex)) {
          resultDiv.innerHTML = `<span class="error">Error: Unsupported formatting/structure in input.</span>`;
          return;
        }
      }

      submitBtn.disabled = true;
      submitBtn.innerText = "Calculating...";
      resultDiv.innerHTML = `<span style="color: var(--subtext);">Calculating...</span>`;

      let endpoint = "";
      let payload = { latex_input: inputLatex };

      if (currentTab === 'derivatives') {
        endpoint = `${API_BASE_URL}/derivative`;
        payload.variable = document.getElementById('deriv-var').value || 'x';
        payload.order = parseInt(document.getElementById('deriv-order').value) || 1;
      }
      else if (currentTab === 'implicit') {
        endpoint = `${API_BASE_URL}/implicit`;
        payload.x_var = document.getElementById('imp-xvar').value || 'x';
        payload.y_var = document.getElementById('imp-yvar').value || 'y';
      }
      else if (currentTab === 'integrals') {
        endpoint = `${API_BASE_URL}/integral`;
        payload.variable = document.getElementById('int-var').value || 'x';
        payload.lower_bound = document.getElementById('int-lower').value.trim() || null;
        payload.upper_bound = document.getElementById('int-upper').value.trim() || null;
      } 
      else if (currentTab === 'taylor') {
        endpoint = `${API_BASE_URL}/taylor`;
        payload.variable = document.getElementById('taylor-var').value || 'x';
        payload.center = document.getElementById('taylor-center').value || '0';
        payload.num_terms = parseInt(document.getElementById('taylor-terms').value) || 5;
      }

      try {
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.success) {
          resultDiv.innerHTML = `$$${data.result_latex}$$`;
        } else {
          resultDiv.innerHTML = `<span class="error">Error: ${data.error}</span>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<span class="error">Failed to connect to backend server. Make sure "python -m app.main" is running on port 5001.</span>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Solve";
        
        if (window.MathJax && window.MathJax.typesetPromise) {
          MathJax.typesetPromise([resultDiv]);
        }
      }
    }
  </script>
</body>
</html>
